<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation spéciale ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#ffecc7);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.caja{
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    z-index:2;
}

button{
    padding:15px 28px;
    font-size:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin:10px;
}

#si{
    background:#4CAF50;
    color:white;
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

#resultado{
    display:none;
    margin-top:20px;
}

#maps{
    display:inline-block;
    margin-top:15px;
    background:#4285F4;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
}

.heart{
    position:fixed;
    font-size:30px;
    animation:subir 4s linear forwards;
}

@keyframes subir{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-600px);opacity:0;}
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    animation:caer 3s linear forwards;
}

@keyframes caer{
    from{transform:translateY(-30px) rotate(0deg);}
    to{transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>

<body>

<div class="caja">

<h1>🌇 Voudrais-tu venir à ma terrasse ?</h1>

<p>Pour voir ce qui se passe... 👀</p>

<button id="si">Oui ❤️</button>
<button id="no">Non 😅</button>

<div id="resultado">

<h2>🎉 Parfait !!</h2>

<p><b>Adresse :</b><br>
997 Rue Notre-Dame, Repentigny, QC J5Y 1C9</p>

<a id="maps"
href="https://www.google.com/maps/search/?api=1&query=997+Rue+Notre-Dame+Repentigny+QC+J5Y+1C9"
target="_blank">
Ouvrir dans Google Maps 📍
</a>

</div>

</div>

<script>

const no=document.getElementById("no");

function mover(){
const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-70);
no.style.left=x+"px";
no.style.top=y+"px";
}

no.addEventListener("mouseover",mover);
no.addEventListener("touchstart",function(e){
e.preventDefault();
mover();
});

document.getElementById("si").onclick=function(){

document.getElementById("resultado").style.display="block";

for(let i=0;i<150;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["red","blue","green","yellow","purple","orange"][Math.floor(Math.random()*6)];
c.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.bottom="-30px";
h.style.fontSize=(20+Math.random()*25)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
},300);

}

</script>

</body>
</html>
